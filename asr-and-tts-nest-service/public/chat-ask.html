<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>聊天记录问答</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      color: #fff;
      text-align: center;
      margin-bottom: 30px;
      font-weight: 600;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-weight: 500;
      color: #333;
      margin-bottom: 8px;
    }
    .hint {
      font-size: 13px;
      color: #888;
      margin-bottom: 8px;
    }
    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #667eea;
    }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .answer-section {
      margin-top: 30px;
      display: none;
    }
    .answer-section.visible {
      display: block;
    }
    .answer-title {
      font-weight: 600;
      color: #333;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .answer-content {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 20px;
      line-height: 1.8;
      color: #444;
      min-height: 100px;
      white-space: pre-wrap;
    }
    .answer-content.loading {
      color: #888;
    }
    .sources-section {
      margin-top: 20px;
      display: none;
    }
    .sources-section.visible {
      display: block;
    }
    .sources-title {
      font-weight: 500;
      color: #666;
      margin-bottom: 10px;
      font-size: 14px;
    }
    .source-item {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .source-score {
      display: inline-block;
      background: #667eea;
      color: #fff;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      margin-right: 8px;
    }
    .source-text {
      color: #555;
      margin-top: 6px;
    }
    .nav-link {
      display: inline-block;
      margin-top: 20px;
      color: #fff;
      text-decoration: none;
      opacity: 0.9;
    }
    .nav-link:hover {
      opacity: 1;
      text-decoration: underline;
    }
    .example-questions {
      margin-top: 15px;
    }
    .example-questions span {
      display: inline-block;
      background: #f0f0f0;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      color: #666;
      margin: 4px 4px 4px 0;
      cursor: pointer;
      transition: background 0.2s;
    }
    .example-questions span:hover {
      background: #e0e0e0;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
      padding: 14px 16px;
      background: #f5f6ff;
      border-radius: 10px;
      border: 1px solid #e8e8ff;
    }
    .toggle-row > span {
      font-size: 15px;
      color: #333;
      font-weight: 500;
    }
    .toggle-row .hint-inline {
      display: block;
      font-size: 12px;
      color: #888;
      font-weight: 400;
      margin-top: 4px;
    }
    .switch {
      position: relative;
      width: 48px;
      height: 28px;
      flex-shrink: 0;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #ccc;
      border-radius: 28px;
      transition: 0.25s;
    }
    .slider:before {
      position: absolute;
      content: '';
      height: 22px;
      width: 22px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.25s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .switch input:checked + .slider {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .switch input:checked + .slider:before {
      transform: translateX(20px);
    }
    .switch input:focus-visible + .slider {
      outline: 2px solid #667eea;
      outline-offset: 2px;
    }
    .images-section {
      margin-top: 24px;
      display: none;
    }
    .images-section.visible {
      display: block;
    }
    .images-title {
      font-weight: 500;
      color: #666;
      margin-bottom: 12px;
      font-size: 14px;
    }
    .images-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }
    .image-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      overflow: hidden;
      font-size: 13px;
    }
    .image-card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      display: block;
      background: #eee;
    }
    .image-card-body {
      padding: 10px 12px;
    }
    .image-card-score {
      display: inline-block;
      background: #764ba2;
      color: #fff;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      margin-bottom: 6px;
    }
    .image-card-title {
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
      line-height: 1.35;
    }
    .image-card-desc {
      color: #666;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .image-card a {
      color: #667eea;
      font-size: 12px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>💕 聊天记录问答</h1>
    <div class="card">
      <div class="form-group">
        <label for="question">问一个问题</label>
        <p class="hint">基于你上传的聊天记录，AI 会帮你找到相关内容并回答</p>
        <input type="text" id="question" placeholder="例如：我们上次聊了什么开心的事？">
      </div>
      <div class="toggle-row">
        <label for="searchImagesToggle" style="cursor:pointer; flex:1;">
          <span>搜索图片知识库</span>
          <span class="hint-inline">打开后，AI 回答会一并参考已入库的图片说明；下方展示匹配到的图片</span>
        </label>
        <label class="switch" title="是否在问答中检索图片">
          <input type="checkbox" id="searchImagesToggle">
          <span class="slider"></span>
        </label>
      </div>
      <button class="btn" id="askBtn" onclick="askQuestion()">提问</button>
      
      <div class="example-questions">
        <span onclick="setQuestion('我们最近聊了什么有趣的事？')">我们最近聊了什么有趣的事？</span>
        <span onclick="setQuestion('她最近的心情怎么样？')">她最近的心情怎么样？</span>
        <span onclick="setQuestion('我们有什么共同的爱好？')">我们有什么共同的爱好？</span>
      </div>

      <div class="answer-section" id="answerSection">
        <div class="answer-title">
          <span>🤖</span> AI 回答
        </div>
        <div class="answer-content" id="answerContent"></div>
      </div>

      <div class="sources-section" id="sourcesSection">
        <div class="sources-title">📚 参考的聊天记录片段</div>
        <div id="sourcesList"></div>
      </div>

      <div class="images-section" id="imagesSection">
        <div class="images-title">🖼️ 匹配的图片知识库</div>
        <div class="images-grid" id="imagesGrid"></div>
      </div>
    </div>
    <a href="/chat-upload.html" class="nav-link">← 返回上传页面</a>
  </div>

  <script>
    const questionEl = document.getElementById('question');
    const askBtn = document.getElementById('askBtn');
    const answerSection = document.getElementById('answerSection');
    const answerContent = document.getElementById('answerContent');
    const sourcesSection = document.getElementById('sourcesSection');
    const sourcesList = document.getElementById('sourcesList');
    const searchImagesToggle = document.getElementById('searchImagesToggle');
    const imagesSection = document.getElementById('imagesSection');
    const imagesGrid = document.getElementById('imagesGrid');

    function setQuestion(q) {
      questionEl.value = q;
      questionEl.focus();
    }

    questionEl.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        askQuestion();
      }
    });

    async function askQuestion() {
      const question = questionEl.value.trim();
      if (!question) {
        alert('请输入问题');
        return;
      }

      askBtn.disabled = true;
      answerSection.classList.add('visible');
      answerContent.classList.add('loading');
      answerContent.textContent = '正在思考...';
      sourcesSection.classList.remove('visible');
      imagesSection.classList.remove('visible');
      imagesGrid.innerHTML = '';

      const useImageSearch = searchImagesToggle.checked;

      try {
        // 先获取相关片段
        const searchRes = await fetch(`/chat-memory/search?q=${encodeURIComponent(question)}&limit=3`);
        const searchData = await searchRes.json();
        
        if (searchData.success && searchData.results.length > 0) {
          sourcesSection.classList.add('visible');
          sourcesList.innerHTML = searchData.results.map(r => `
            <div class="source-item">
              <span class="source-score">相似度 ${(r.score * 100).toFixed(1)}%</span>
              <div class="source-text">${escapeHtml(r.content)}</div>
            </div>
          `).join('');
        }

        if (useImageSearch) {
          try {
            const imgRes = await fetch(
              `/image-knowledge/search?q=${encodeURIComponent(question)}&limit=5`,
            );
            const imgData = await imgRes.json();
            if (imgData.success && imgData.results && imgData.results.length > 0) {
              imagesSection.classList.add('visible');
              imagesGrid.innerHTML = imgData.results
                .map((r) => {
                  const url = escapeHtml(r.imageUrl || '');
                  const title = r.title ? escapeHtml(r.title) : '（无标题）';
                  const desc = escapeHtml((r.content || '').slice(0, 200));
                  const pct = ((r.score ?? 0) * 100).toFixed(1);
                  return `
                  <div class="image-card">
                    <a href="${url}" target="_blank" rel="noopener noreferrer">
                      <img src="${url}" alt="" loading="lazy" onerror="this.style.display='none'">
                    </a>
                    <div class="image-card-body">
                      <span class="image-card-score">相似度 ${pct}%</span>
                      <div class="image-card-title">${title}</div>
                      <div class="image-card-desc">${desc}</div>
                      <div style="margin-top:8px;"><a href="${url}" target="_blank" rel="noopener noreferrer">打开原图</a></div>
                    </div>
                  </div>`;
                })
                .join('');
            }
          } catch (_) {
            /* 图库未配置或检索失败时不阻断问答 */
          }
        }

        // 流式获取回答
        answerContent.textContent = '';
        answerContent.classList.remove('loading');

        const askQs = new URLSearchParams({
          q: question,
          limit: '3',
        });
        if (useImageSearch) askQs.set('searchImages', '1');

        const response = await fetch(`/chat-memory/ask?${askQs.toString()}`);
        const reader = response.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          
          const text = decoder.decode(value);
          const lines = text.split('\n');
          
          for (const line of lines) {
            if (line.startsWith('data: ')) {
              const data = line.slice(6);
              if (data === '[DONE]') break;
              try {
                const parsed = JSON.parse(data);
                if (parsed.content) {
                  answerContent.textContent += parsed.content;
                }
              } catch (e) {}
            }
          }
        }

        if (!answerContent.textContent) {
          answerContent.textContent = '没有找到相关的聊天记录内容。';
        }
      } catch (error) {
        answerContent.classList.remove('loading');
        answerContent.textContent = '请求失败: ' + error.message;
      } finally {
        askBtn.disabled = false;
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
